name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: SSHWarden ${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## SSHWarden ${{ steps.get_version.outputs.version }}

            ### 下载

            - **Windows**: sshwarden-${{ steps.get_version.outputs.version }}-windows-x64.zip
            - **Linux**: sshwarden-${{ steps.get_version.outputs.version }}-linux-x64.tar.gz
            - **macOS**: sshwarden-${{ steps.get_version.outputs.version }}-macos-x64.tar.gz

            ### 安装说明

            1. 下载对应平台的压缩包
            2. 解压到任意目录
            3. 将 `config.toml.example` 复制为 `config.toml` 并配置
            4. 运行 `sshwarden daemon` 启动守护进程

            详细文档请参阅 [README.md](https://github.com/Hureru/SSHWarden/blob/main/README.md)

  build-release:
    name: Build Release - ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: sshwarden.exe
          - os: ubuntu-latest
            artifact_name: sshwarden
          - os: macos-latest
            artifact_name: sshwarden

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev

      - name: Build release
        run: cargo build --release --verbose

      - name: Package release (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          mkdir release-package
          cp target/release/sshwarden.exe release-package/
          cp config.toml.example release-package/
          cp README.md release-package/
          7z a sshwarden-${VERSION}-windows-x64.zip ./release-package/*

      - name: Package release (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          mkdir release-package
          cp target/release/sshwarden release-package/
          cp config.toml.example release-package/
          cp README.md release-package/
          chmod +x release-package/sshwarden
          tar -czf sshwarden-${VERSION}-linux-x64.tar.gz -C release-package .

      - name: Package release (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          VERSION=${{ needs.create-release.outputs.version }}
          mkdir release-package
          cp target/release/sshwarden release-package/
          cp config.toml.example release-package/
          cp README.md release-package/
          chmod +x release-package/sshwarden
          tar -czf sshwarden-${VERSION}-macos-x64.tar.gz -C release-package .

      - name: Upload Release Asset (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./sshwarden-${{ needs.create-release.outputs.version }}-windows-x64.zip
          asset_name: sshwarden-${{ needs.create-release.outputs.version }}-windows-x64.zip
          asset_content_type: application/zip

      - name: Upload Release Asset (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./sshwarden-${{ needs.create-release.outputs.version }}-linux-x64.tar.gz
          asset_name: sshwarden-${{ needs.create-release.outputs.version }}-linux-x64.tar.gz
          asset_content_type: application/gzip

      - name: Upload Release Asset (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./sshwarden-${{ needs.create-release.outputs.version }}-macos-x64.tar.gz
          asset_name: sshwarden-${{ needs.create-release.outputs.version }}-macos-x64.tar.gz
          asset_content_type: application/gzip
